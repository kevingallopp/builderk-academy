<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Fondo negro círculo -->
  <circle cx="250" cy="250" r="250" fill="#1a1a1a"/>
  
  <!-- BUILDER en blanco -->
  <text x="55" y="240"
        font-family="Arial Black, Franklin Gothic Heavy, Impact, sans-serif"
        font-size="76"
        font-weight="900"
        fill="#FFFFFF">BUILDER</text>
  
  <!-- K en naranja — separada como elemento propio -->
  <text x="408" y="240"
        font-family="Arial Black, Franklin Gothic Heavy, Impact, sans-serif"
        font-size="76"
        font-weight="900"
        fill="#FF8C00">K</text>

  <!-- Línea naranja -->
  <rect x="100" y="258" width="300" height="3" rx="1.5" fill="#FF8C00"/>

  <!-- ACADEMY -->
  <text x="250" y="318"
        font-family="Arial, Helvetica Neue, sans-serif"
        font-size="34"
        font-weight="700"
        fill="#FF8C00"
        text-anchor="middle"
        letter-spacing="11">ACADEMY</text>
</svg>
